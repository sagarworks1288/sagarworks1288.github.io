<!DOCTYPE html>
<html lang="en">

<head>
  <title>Streak</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js" integrity="sha512-WFN04846sdKMIP5LKNphMaWzU7YpMyCU245etK3g/2ARYbPK9Ub18eG+ljU96qKRCWh+quCY7yefSmlkQw1ANQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>

  <div class="container-fluid p-5 bg-primary text-white text-center">
    <h1>My First Bootstrap Page</h1>
    <p>Resize this responsive page to see the effect!</p>
  </div>


  <div class="form-control">
    <label for="fileInput" class="form-label mt-4">Default file input example</label>
    <input class="form-control" type="file" id="fileInput"  id="fileInput" accept=".csv" >
  </div>

  <div class="card" id="tableArea">
   
  </div>

  <div class="card" id="summeryArea">
   
  </div>



  <script>
    document.getElementById('fileInput').addEventListener('change', function (event) {
      const file = event.target.files[0];
      if (!file) return;
      Papa.parse(file, {
        header: true, // makes objects using first row as keys
        skipEmptyLines: true,
        complete: function (results) {
          console.log('CSV parsing complete:', results);
          parseCsvData(results)
        }
      });
    });


    const analysiser = (row, headers) => {
        let streakNumber = 0;
        let streakType = '';
        let total = 0
        _.forEach(Object.keys(row), (key) => {
          const colVal = `${row[key]}`;
          if (key !== 'Symbol' && (colVal === "1" || colVal === "0")) {
            if (streakType !== colVal) {
              streakNumber++
            }
            total += parseInt(colVal)

          }
          streakType = colVal
        })
        return `${streakNumber}`;
        // console.log('Analyzing row:', row, 'Header:', header,index,remainsHeaders);
      }

      const totaler = (row, headers) => {
        let total = 0
        _.forEach(Object.keys(row), (key) => {
          const colVal = `${row[key]}`;
          if (key !== 'Symbol' && (colVal === "1" || colVal === "0")) {
            total += parseInt(colVal)
          }
          streakType = colVal
        })
        return total;
        // console.log('Analyzing row:', row, 'Header:', header,index,remainsHeaders);
      }


    const parseCsvData = (results) => {
        try {
          const summeryObj = {}
          const headers = _.get(results,'meta.fields', []);
          const data = _.get(results,'data', []);

          let tableHeaders = headers.map(header => `<th>${header}</th>`).join('');

          let tableRows = data.map(row => {
          
            let rowData = headers.map((header,headerIndex) =>{
              
              const displayvalue = `${row[header]}`
            
              return `<td class="${row[header]==1 ? "bg-success" : "bg-danger"}" >${displayvalue}</td>`
            } ).join('');
            const analysiserResult = analysiser(row,headers)
            const total = totaler(row,headers)

            rowData += `<td>${analysiserResult}</td>`
            rowData += `<td>${total}</td>`


            return `<tr>${rowData}</tr>`;
          }).join('');
          
          let tableWrapper = `<table class="table table-striped"><thead><tr>${tableHeaders}<th>Result</th><th>Total</th></tr></thead><tbody>${tableRows}</tbody></table>`
          console.log('Parsing CSV data:', data);
          document.getElementById('tableArea').innerHTML = tableWrapper;

          console.log('Summary Object:', summeryObj);
          let summeryTableHeaders = `<th>Value</th><th>Count</th>`;
          const sorted = _.fromPairs(
  _.sortBy(_.toPairs(summeryObj), ([key, value]) => value)
);

          let summeryTableRows = Object.entries(sorted).map(([key, value]) => {
            return `<tr><td>${key}</td><td>${value}</td></tr>`;
          }).join('');  
          let summeryTableWrapper = `<table class="table table-striped"><thead><tr>${summeryTableHeaders}</tr></thead><tbody>${summeryTableRows}</tbody></table>`
          document.getElementById('summeryArea').innerHTML = summeryTableWrapper;

        } catch (error) {
          console.error('Error parsing CSV:', error);
        }



      }
  </script>

</body>

</html>
